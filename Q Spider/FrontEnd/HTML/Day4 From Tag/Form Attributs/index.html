<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    
       <form action="">

        <input type="text" placeholder="Username"><br>
        <input type="text" minlength="10" maxlength="10" placeholder="Enter a Number">
        <input type="text" accesskey="a" placeholder=" Use Alt + a">
        <input type="text" accesskey="b" placeholder="Use Alt + b">
        <input type="text" autofocus>
        <input type="text" checked>
        <input type="text" disabled>
        <input type="text" readonly>
        <input type="text" draggable="true">
        <input type="text" required> <span style="color: red;">*</span>
        <input type="text" disable checked>
        

        <button>Click Me</button>

        <textarea name="" id="" placeholder="write a note"></textarea>



         
       </form>

</body>
</html>
